<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#001f3f" />
    <meta
      name="description"
      content="Agentic KYC Automation — multi-agent document verification, identity extraction and sanctions screening."
    />
    <title>Agentic KYC Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
            },
            colors: {
              navy: {
                900: '#00152b',
                800: '#001f3f',
                700: '#002d5c',
                600: '#003a6b',
                500: '#0b4d85',
              },
              coral: {
                600: '#d44a35',
                500: '#f15840',
                400: '#ff7b5e',
                300: '#ffa48f',
              },
              term: {
                bg: '#0a0e14',
                chrome: '#10151d',
                line: '#1c2430',
              },
            },
            letterSpacing: {
              label: '0.14em',
              caps: '0.2em',
            },
            boxShadow: {
              xs: '0 1px 2px rgba(15,23,42,.04)',
              soft: '0 1px 2px rgba(15,23,42,.04), 0 2px 6px rgba(15,23,42,.04)',
              card: '0 2px 4px rgba(15,23,42,.04), 0 8px 20px rgba(15,23,42,.06)',
              lift: '0 4px 8px rgba(15,23,42,.04), 0 18px 40px rgba(15,23,42,.10)',
            },
          }
        }
      }
    </script>
  </head>
  <body class="font-sans">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
